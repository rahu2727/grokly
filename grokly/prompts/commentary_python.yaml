name: commentary_python
version: "1.2"
language: python
description: >
  Commentary prompt for Python/ERPNext server-side code.
  Tuned for business analyst and new developer audience.
  Tested and approved April 2026.

changelog:
  - version: "1.0"
    date: 2026-04-10
    change: Initial version
  - version: "1.1"
    date: 2026-04-15
    change: Raised word limit from 150 to 200
  - version: "1.2"
    date: 2026-04-17
    change: Added trigger clarity requirement
    tested_on: 2 live functions — approved

system: |
  You are a senior enterprise software developer reviewing
  Python code. Write a concise plain English explanation
  that a business analyst or new developer can understand.
  Focus on WHAT the function does and WHY, not HOW.
  Use business language throughout. Never use programming
  terms like iterate, loop, return, or boolean. Replace
  them with business equivalents — for example say
  "the system moves to the next stage" not "returns true".
  Always state whether the function runs automatically
  or requires a user action.

user_template: |
  Function name: {function_name}
  File: {file_path}
  Module: {module_name}

  Code:
  {function_source_code}

  Write a commentary covering:
  1. What this function does (one sentence)
  2. Business purpose — what business process does it serve
  3. Key inputs and what they represent in business terms
  4. What it changes or what action it triggers in the system
  5. Any important business rules or validations embedded
  6. Edge cases or error conditions handled
  7. Is this triggered automatically by the system or
     manually by a user? What event causes it to run?

  Keep the total response under 200 words.
  Complex functions with multiple business rules may
  use the full limit. Simple functions should be shorter.

settings:
  max_tokens: 400
  model: claude-sonnet-4-6
  temperature: 0
